<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="./css/style.css">
    <link rel="stylesheet" href="./css/normalize.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Andika:ital,wght@0,400;0,700;1,400;1,700&display=swap"
        rel="stylesheet">
    <title>Formulario | The Odin Project</title>
</head>

<body>

    <article class="contenedorPrincipal">

        <div class="contenedorSecundario">
            <header class="cabecera">
                <h1 class="titulo">Esto no es un servicio online real!</h1>
                <p class="descripcion">Pero, si quieres que esto sea un servicio creado por ti y diseñado a tu gusto
                    <br>
                    registrate y cumple tus sueños!
                </p>
            </header>

            <form action="" class="formulario">

                <fieldset class="contenedorFormulario">
                    <p>Continuemos!</p>
                    <div class="campo">
                        <label for="nombre">Nombre</label>
                        <input type="text" id="nombre" placeholder="John..." required>
                    </div>

                    <div class="campo">
                        <label for="apellido">Apellido</label>
                        <input type="text" id="apellido" placeholder="Doe...">
                    </div>

                    <div class="campo">
                        <label for="email">Email</label>
                        <input type="email" id="email" placeholder="correo@correo.com" required>
                    </div>

                    <div class="campo">
                        <label for="telefono">Numero de telefono</label>
                        <input type="tel" id="telefono" placeholder="3322556677" required>
                    </div>

                    <div class="campo">
                        <label for="contraseña">Contraseña</label>
                        <input type="password" id="contraseña" required>
                    </div>

                    <div class="campo">
                        <label for="confirmar">Confirme su contraseña</label>
                        <input type="password" id="confirmar" required>
                    </div>

                    <div class="alerta"></div>

                </fieldset>
                <input class="boton" type="submit" value="Crear Cuenta">
            </form>
            <p class="iniciarSesion">¿Ya tienes una cuenta? <a href="#">Ingresa aquí</a></p>
        </div>

        <div class="contenedorImagen">
            <img class="imagen" src="./img/michael-baccin-sUYFMV0TOYA-unsplash.jpg" alt="imagen-fondo">

            <div class="logo">
                <img class="odin" src="./img/odin-lined.png" alt="logo-odin-project">
                <h1>ODIN</h1>
            </div>
        </div>
    </article>


    <script src="./js/scrip.js"></script>
</body>

</html>
